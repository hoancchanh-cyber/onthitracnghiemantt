<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Thi Trắc Nghiệm Online</title>
  <style>
    /* Làm cho khung hình tràn toàn màn hình */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* Chặn thanh cuộn kép */
      background-color: #f5f5f5;
    }

    /* Định dạng Iframe */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Hiệu ứng loading trong khi chờ Google Script tải */
    .loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      z-index: -1; /* Nằm dưới iframe */
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1976d2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Lớp phủ thông báo đang tải (sẽ hiện ra nếu mạng chậm) -->
  <div class="loading-overlay">
    <div class="spinner"></div>
    <p style="font-family: sans-serif; color: #666; margin-top: 15px;">Đang tải bài thi...</p>
  </div>

  <!-- NHÚNG LINK CỦA BẠN VÀO ĐÂY -->
  <iframe 
    src="https://script.google.com/macros/s/AKfycbxesl9qvvefebXKvB5ElaJ7NROJkfMIPeA_aRsmGk0ULMVoacmexNKh7ZcMf0ssO2dO/exec"
    allow="autoplay; camera; microphone; geolocation"
    allowfullscreen>
  </iframe>

</body>
</html>
